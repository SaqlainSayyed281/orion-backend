name: Docker Image Build

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build from'
        required: true
        default: 'main'

jobs:
  build:
    name: Build & Push Docker Image via Nitro Server
    runs-on: self-hosted

    steps:
      - name: Resolve branch name
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "branch=${{ github.event.inputs.branch }}" >> $GITHUB_OUTPUT
          else
            echo "branch=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout & Pull Branch
        run: |
          cd ~/orion-backend
          git fetch --all
          git checkout ${{ steps.vars.outputs.branch }}
          git pull origin ${{ steps.vars.outputs.branch }}

      - name: Build Docker Image
        run: |
          cd ~/orion-backend
          docker build -t orion-backend:${{ steps.vars.outputs.branch }} .

      - name: Push to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_TOKEN }}" | docker login -u "${{ vars.DOCKER_USERNAME }}" --password-stdin

          docker tag orion-backend:${{ steps.vars.outputs.branch }} \
            ${{ vars.DOCKER_USERNAME }}/orion-backend:${{ steps.vars.outputs.branch }}
          docker tag orion-backend:${{ steps.vars.outputs.branch }} \
            ${{ vars.DOCKER_USERNAME }}/orion-backend:latest

          docker push ${{ vars.DOCKER_USERNAME }}/orion-backend:${{ steps.vars.outputs.branch }}
          docker push ${{ vars.DOCKER_USERNAME }}/orion-backend:latest

          docker logout

      - name: Write Build Summary
        run: |
          BRANCH="${{ steps.vars.outputs.branch }}"
          USERNAME="${{ vars.DOCKER_USERNAME }}"
          IMAGE="$USERNAME/orion-backend"
          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
          COMMIT="${{ github.sha }}"
          SHORT_COMMIT="${COMMIT:0:7}"

          echo "## ORION Docker Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Image** | \`$IMAGE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`$BRANCH\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$SHORT_COMMIT\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Tags pushed** | \`$IMAGE:$BRANCH\` \`$IMAGE:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Built at** | $TIMESTAMP |" >> $GITHUB_STEP_SUMMARY
          echo "| **Docker Hub** | https://hub.docker.com/r/$IMAGE |" >> $GITHUB_STEP_SUMMARY
